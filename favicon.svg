<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo escuro -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  
  <!-- Gráfico de linha dourado -->
  <polyline 
    points="4,24 10,18 15,21 20,12 28,8" 
    fill="none" 
    stroke="#c9a84c" 
    stroke-width="2.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"/>
  
  <!-- Ponto de destaque no topo -->
  <circle cx="28" cy="8" r="2.5" fill="#f0c040"/>
  
  <!-- Linha base sutil -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
</svg>
